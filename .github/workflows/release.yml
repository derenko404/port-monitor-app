name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload artifacts

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # typecheck + electron-vite build (compiles main/preload/renderer)
      - run: npm run build

      # package arm64 + x64 dmg and upload to the GitHub Release for this tag
      - run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
